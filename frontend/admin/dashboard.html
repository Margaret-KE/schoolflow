<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Dashboard - SchoolFlow SaaS</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }
        
        .header {
            background: #1e293b;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-size: 14px;
        }
        
        .logout {
            background: #ef4444;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .container {
            padding: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .card h2 {
            margin: 0;
            color: #2563eb;
            font-size: 28px;
        }
        
        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        
        canvas {
            width: 100% !important;
            height: 320px !important;
        }
    </style>
</head>

<body>

    <div class="header">
        <div>
            <strong>🏫 SchoolFlow Admin</strong>
            <span class="nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="students.html">Students</a>
                <a href="payments.html">Payments</a>
                <a href="attendance.html">Attendance</a>
            </span>
        </div>

        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="container">

        <div class="stats">
            <div class="card">
                <h2 id="students">0</h2>
                <p>Total Students</p>
            </div>
            <div class="card">
                <h2 id="parents">0</h2>
                <p>Total Parents</p>
            </div>
            <div class="card">
                <h2 id="teachers">0</h2>
                <p>Total Teachers</p>
            </div>
            <div class="card">
                <h2 id="revenue">KES 0</h2>
                <p>Total Revenue</p>
            </div>
        </div>

        <div class="charts">
            <div class="chart-card"><canvas id="genderChart"></canvas></div>
            <div class="chart-card"><canvas id="classChart"></canvas></div>
            <div class="chart-card"><canvas id="attendanceChart"></canvas></div>
            <div class="chart-card"><canvas id="revenueChart"></canvas></div>
        </div>

    </div>

    <script>
        const API_BASE = "http://localhost:5000/api";

        let token = localStorage.getItem("token");
        let refreshToken = localStorage.getItem("refreshToken");

        const charts = {};

        // ===============================
        // LOGOUT
        // ===============================
        function logout() {
            localStorage.clear();
            window.location.href = "../auth/login.html";
        }

        // ===============================
        // REFRESH TOKEN
        // ===============================
        async function refreshAccessToken() {
            try {
                const res = await fetch(API_BASE + "/auth/refresh", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        refreshToken
                    })
                });

                const data = await res.json();

                if (!res.ok) throw new Error("Refresh failed");

                token = data.accessToken;
                localStorage.setItem("token", token);

                return true;

            } catch (err) {
                logout();
                return false;
            }
        }

        // ===============================
        // SAFE API (AUTO REFRESH)
        // ===============================
        async function api(url, retry = true) {

            const res = await fetch(API_BASE + url, {
                headers: {
                    Authorization: "Bearer " + token
                }
            });

            if (res.status === 401 && retry) {

                const refreshed = await refreshAccessToken();

                if (refreshed) {
                    return api(url, false);
                }
            }

            const data = await res.json().catch(() => ({}));

            if (!res.ok) throw new Error(data.message || "Request failed");

            return data;
        }

        // ===============================
        // CHART DESTROY
        // ===============================
        function destroy(id) {
            if (charts[id]) charts[id].destroy();
        }

        // ===============================
        // GENDER CHART (COLORED)
        // ===============================
        function genderChart(students) {

            destroy("gender");

            let male = 0,
                female = 0;

            students.forEach(s => {
                if (s.gender === "male") male++;
                if (s.gender === "female") female++;
            });

            charts.gender = new Chart(
                document.getElementById("genderChart"), {
                    type: "pie",
                    data: {
                        labels: ["Male", "Female"],
                        datasets: [{
                            data: [male, female],
                            backgroundColor: ["#3b82f6", "#ec4899"]
                        }]
                    }
                }
            );
        }

        // ===============================
        // CLASS CHART
        // ===============================
        function classChart(students) {

            destroy("class");

            const map = {};

            students.forEach(s => {
                const c = s.student_class || "Unknown";
                map[c] = (map[c] || 0) + 1;
            });

            charts.class = new Chart(
                document.getElementById("classChart"), {
                    type: "bar",
                    data: {
                        labels: Object.keys(map),
                        datasets: [{
                            label: "Students",
                            data: Object.values(map),
                            backgroundColor: "#22c55e"
                        }]
                    }
                }
            );
        }

        // ===============================
        // ATTENDANCE
        // ===============================
        function attendanceChart(data) {

            destroy("attendance");

            charts.attendance = new Chart(
                document.getElementById("attendanceChart"), {
                    type: "doughnut",
                    data: {
                        labels: ["Present", "Absent"],
                        datasets: [{
                            data: [
                                (data && data.present) ? data.present : 0,
                                (data && data.absent) ? data.absent : 0
                            ],
                            backgroundColor: ["#10b981", "#ef4444"]
                        }]
                    }
                }
            );
        }

        // ===============================
        // REVENUE
        // ===============================
        function revenueChart(data) {

            destroy("revenue");

            charts.revenue = new Chart(
                document.getElementById("revenueChart"), {
                    type: "line",
                    data: {
                        labels: (data && data.labels) ? data.labels : [],
                        datasets: [{
                            label: "Revenue",
                            data: (data && data.data) ? data.data : [],
                            borderColor: "#f59e0b",
                            fill: false
                        }]
                    }
                }
            );
        }

        // ===============================
        // LOAD DASHBOARD
        // ===============================
        async function load() {

            try {

                const dashboard = await api("/dashboards");
                const students = await api("/students");

                document.getElementById("students").innerText = dashboard.totalStudents || 0;
                document.getElementById("parents").innerText = dashboard.totalParents || 0;
                document.getElementById("teachers").innerText = dashboard.totalTeachers || 0;
                document.getElementById("revenue").innerText = "KES " + (dashboard.totalRevenue || 0);

                genderChart(students);
                classChart(students);
                attendanceChart(dashboard.attendanceChart);
                revenueChart(dashboard.revenueChart);

            } catch (err) {
                console.error(err.message);
            }
        }

        load();
    </script>

</body>

</html>
