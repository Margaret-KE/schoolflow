<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Dashboard - SchoolFlow SaaS</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }
        /* ===============================
        HEADER
        =============================== */
        
        .header {
            background: #1e293b;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-size: 14px;
        }
        
        .logout {
            background: #ef4444;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        /* ===============================
        CONTAINER
        =============================== */
        
        .container {
            padding: 20px;
        }
        /* ===============================
        STATS
        =============================== */
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .card h2 {
            margin: 0;
            color: #2563eb;
            font-size: 28px;
        }
        
        .card p {
            margin-top: 10px;
            color: #555;
        }
        /* ===============================
        CHARTS
        =============================== */
        
        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .chart-title {
            margin-bottom: 15px;
            font-weight: bold;
            color: #1e293b;
        }
        
        canvas {
            width: 100% !important;
            height: 320px !important;
        }
        /* ===============================
        MOBILE
        =============================== */
        
        @media (max-width: 900px) {
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            .charts {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 600px) {
            .stats {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- ===============================
HEADER
=============================== -->
    <div class="header">

        <div>
            <strong>🏫 SchoolFlow Admin</strong>

            <span class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="students.html">Students</a>
            <a href="payments.html">Payments</a>
            <a href="attendance.html">Attendance</a>
        </span>
        </div>

        <button class="logout" onclick="logout()">
        Logout
    </button>

    </div>

    <!-- ===============================
MAIN CONTENT
=============================== -->
    <div class="container">

        <!-- ===============================
    STATS
    =============================== -->
        <div class="stats">

            <div class="card">
                <h2 id="students">0</h2>
                <p>Total Students</p>
            </div>

            <div class="card">
                <h2 id="parents">0</h2>
                <p>Total Parents</p>
            </div>

            <div class="card">
                <h2 id="teachers">0</h2>
                <p>Total Teachers</p>
            </div>

            <div class="card">
                <h2 id="revenue">KES 0</h2>
                <p>Total Revenue</p>
            </div>

        </div>

        <!-- ===============================
    CHARTS
    =============================== -->
        <div class="charts">

            <div class="chart-card">
                <div class="chart-title">
                    Student Gender Distribution
                </div>

                <canvas id="genderChart"></canvas>
            </div>

            <div class="chart-card">
                <div class="chart-title">
                    Students Per Class
                </div>

                <canvas id="classChart"></canvas>
            </div>

            <div class="chart-card">
                <div class="chart-title">
                    Attendance Analytics
                </div>

                <canvas id="attendanceChart"></canvas>
            </div>

            <div class="chart-card">
                <div class="chart-title">
                    Revenue Analytics
                </div>

                <canvas id="revenueChart"></canvas>
            </div>

        </div>

    </div>

    <!-- ===============================
JAVASCRIPT
=============================== -->
    <script>
        const token = localStorage.getItem("token");

        const API_BASE = "http://localhost:5000/api";

        // ===============================
        // AUTH CHECK
        // ===============================
        if (!token) {
            window.location.href = "../auth/login.html";
        }

        // ===============================
        // CHART STORAGE
        // ===============================
        const charts = {};

        // ===============================
        // SAFE API FETCH
        // ===============================
        async function api(url) {

            try {

                const response = await fetch(API_BASE + url, {
                    headers: {
                        Authorization: "Bearer " + token
                    }
                });

                let data = {};

                try {
                    data = await response.json();
                } catch (err) {
                    data = {};
                }

                if (!response.ok) {

                    const message =
                        data.message ?
                        data.message :
                        "Request failed";

                    throw new Error(message);
                }

                return data;

            } catch (error) {

                console.error(error);

                alert(error.message || "Server Error");

                return {};
            }
        }

        // ===============================
        // SUBSCRIPTION CHECK
        // ===============================
        async function checkSubscription() {

            try {

                const response = await fetch(
                    API_BASE + "/subscriptions", {
                        headers: {
                            Authorization: "Bearer " + token
                        }
                    }
                );

                if (response.status === 401) {

                    localStorage.clear();

                    window.location.href =
                        "../auth/login.html";

                    return false;
                }

                if (response.status === 403) {

                    window.location.href =
                        "subscription.html";

                    return false;
                }

                return true;

            } catch (error) {

                console.error(error);

                return false;
            }
        }

        // ===============================
        // DESTROY CHART
        // ===============================
        function destroyChart(id) {

            if (charts[id]) {
                charts[id].destroy();
            }
        }

        // ===============================
        // GENDER CHART
        // ===============================
        function buildGenderChart(students) {

            destroyChart("gender");

            let male = 0;
            let female = 0;

            if (Array.isArray(students)) {

                students.forEach(function(student) {

                    if (student.gender === "male") {
                        male++;
                    }

                    if (student.gender === "female") {
                        female++;
                    }
                });
            }

            charts.gender = new Chart(
                document.getElementById("genderChart"), {
                    type: "pie",

                    data: {
                        labels: ["Male", "Female"],

                        datasets: [{
                            data: [male, female]
                        }]
                    }
                }
            );
        }

        // ===============================
        // CLASS CHART
        // ===============================
        function buildClassChart(students) {

            destroyChart("class");

            const map = {};

            if (Array.isArray(students)) {

                students.forEach(function(student) {

                    const cls =
                        student.student_class ?
                        student.student_class :
                        "Unknown";

                    if (!map[cls]) {
                        map[cls] = 0;
                    }

                    map[cls]++;
                });
            }

            charts.class = new Chart(
                document.getElementById("classChart"), {
                    type: "bar",

                    data: {
                        labels: Object.keys(map),

                        datasets: [{
                            label: "Students",
                            data: Object.values(map)
                        }]
                    }
                }
            );
        }

        // ===============================
        // ATTENDANCE CHART
        // ===============================
        function buildAttendanceChart(attendance) {

            destroyChart("attendance");

            let present = 0;
            let absent = 0;

            if (attendance) {

                if (attendance.present) {
                    present = attendance.present;
                }

                if (attendance.absent) {
                    absent = attendance.absent;
                }
            }

            charts.attendance = new Chart(
                document.getElementById("attendanceChart"), {
                    type: "doughnut",

                    data: {
                        labels: ["Present", "Absent"],

                        datasets: [{
                            data: [present, absent]
                        }]
                    }
                }
            );
        }

        // ===============================
        // REVENUE CHART
        // ===============================
        function buildRevenueChart(revenue) {

            destroyChart("revenue");

            let labels = [];
            let values = [];

            if (revenue) {

                if (Array.isArray(revenue.labels)) {
                    labels = revenue.labels;
                }

                if (Array.isArray(revenue.data)) {
                    values = revenue.data;
                }
            }

            charts.revenue = new Chart(
                document.getElementById("revenueChart"), {
                    type: "line",

                    data: {
                        labels: labels,

                        datasets: [{
                            label: "Revenue",
                            data: values
                        }]
                    }
                }
            );
        }

        // ===============================
        // LOAD DASHBOARD
        // ===============================
        async function loadDashboard() {

            const allowed = await checkSubscription();

            if (!allowed) {
                return;
            }

            // ===============================
            // DASHBOARD DATA
            // ===============================
            const dashboard =
                await api("/dashboards");

            // ===============================
            // UPDATE STATS
            // ===============================
            document.getElementById("students").innerText =
                dashboard.totalStudents || 0;

            document.getElementById("parents").innerText =
                dashboard.totalParents || 0;

            document.getElementById("teachers").innerText =
                dashboard.totalTeachers || 0;

            document.getElementById("revenue").innerText =
                "KES " + (dashboard.totalRevenue || 0);

            // ===============================
            // STUDENTS
            // ===============================
            const students =
                await api("/students");

            // ===============================
            // BUILD CHARTS
            // ===============================
            buildGenderChart(students);

            buildClassChart(students);

            buildAttendanceChart(
                dashboard.attendanceChart
            );

            buildRevenueChart(
                dashboard.revenueChart
            );
        }

        // ===============================
        // LOGOUT
        // ===============================
        function logout() {

            localStorage.clear();

            window.location.href =
                "../auth/login.html";
        }

        // ===============================
        // START
        // ===============================
        loadDashboard();
    </script>

</body>

</html>
